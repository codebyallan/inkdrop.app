@if (loading()) {
  <div class="w-full" role="status" aria-live="polite">
    <div class="border-b border-[var(--mat-sys-outline-variant)]">
      <div class="grid min-h-14" [style.gridTemplateColumns]="gridTemplate()">
        @for (col of columns(); track col.id) {
          <div class="px-4 flex items-center">
            <div class="h-4 w-[8ch] rounded-md bg-[var(--mat-sys-surface-variant)] opacity-60 animate-pulse"></div>
          </div>
        }
      </div>
    </div>
    <div class="divide-y divide-[var(--mat-sys-outline-variant)]">
      @for (r of skeletonRowsArray(); track r) {
        <div class="grid min-h-14" [style.gridTemplateColumns]="gridTemplate()">
          @for (col of columns(); track col.id) {
            <div class="px-4 flex items-center">
              <div class="h-3 rounded bg-[var(--mat-sys-surface-variant)] opacity-60 animate-pulse" [style.width.%]="col.type === 'actions' ? 40 : 60"></div>
            </div>
          }
        </div>
      }
    </div>
  </div>
} @else {
  <div class="overflow-x-auto">
    <table mat-table class="min-w-full" [dataSource]="data()">
      <ng-container *ngFor="let col of columns()" [matColumnDef]="col.id">
        <th mat-header-cell *matHeaderCellDef>{{ col.header || '' }}</th>
        <td mat-cell *matCellDef="let row">
          <ng-container [ngSwitch]="col.type || 'text'">
            <ng-container *ngSwitchCase="'date'">{{ row[col.field || col.id] | date:(col.dateFormat || 'dd/MM/yyyy') }}</ng-container>
            <ng-container *ngSwitchCase="'actions'">
              <button mat-icon-button (click)="emitAction('edit', row)" autoFocus="false" (mousedown)="$event.preventDefault()">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button class="delete-btn" (click)="emitAction('delete', row)" autoFocus="false" (mousedown)="$event.preventDefault()">
                <mat-icon>delete</mat-icon>
              </button>
            </ng-container>
            <ng-container *ngSwitchDefault>{{ row[col.field || col.id] }}</ng-container>
          </ng-container>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columnIds()"></tr>
      <tr mat-row *matRowDef="let row; columns: columnIds()"></tr>
    </table>
  </div>
}
