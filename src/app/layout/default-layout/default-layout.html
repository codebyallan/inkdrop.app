<mat-drawer-container>
    <mat-drawer #drawer [mode]="isMobile() ? 'over' : 'side'" [opened]="!isMobile()">
        <app-logo />
        <app-navbar [items]="NavItems" (itemClicked)="isMobile() && drawer.close()" />
    </mat-drawer>
    <mat-drawer-content>
        <mat-toolbar>
            @if(isMobile()){
            <button mat-icon-button (click)="drawer.toggle()">
                <mat-icon>menu</mat-icon>
            </button>
            }
        </mat-toolbar>
        <main>
            <router-outlet />
        </main>
    </mat-drawer-content>
</mat-drawer-container>
