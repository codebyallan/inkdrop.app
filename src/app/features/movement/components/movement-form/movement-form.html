<h2 mat-dialog-title>New Movement</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="flex flex-col gap-4 pt-2">
    <mat-form-field>
      <mat-label>Toner</mat-label>
      <mat-select formControlName="tonerId">
        @for (t of data.toners; track t.id) {
          <mat-option [value]="t.id">{{ t.label }}</mat-option>
        }
      </mat-select>
      <app-validation-message [control]="form.controls.tonerId" [label]="'Toner'"></app-validation-message>
    </mat-form-field>

    @if (form.controls.type.value === 'out') {
      <mat-form-field>
        <mat-label>Printer</mat-label>
        <mat-select formControlName="printerId">
          @for (p of data.printers; track p.id) {
            <mat-option [value]="p.id">{{ p.name }}</mat-option>
          }
        </mat-select>
        <app-validation-message [control]="form.controls.printerId" [label]="'Printer'"></app-validation-message>
      </mat-form-field>
    }

    <mat-form-field>
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" />
      <app-validation-message [control]="form.controls.quantity" [label]="'Quantity'"></app-validation-message>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        <mat-option value="in">in</mat-option>
        <mat-option value="out">out</mat-option>
      </mat-select>
      <app-validation-message [control]="form.controls.type" [label]="'Type'"></app-validation-message>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Description (optional)</mat-label>
      <input matInput formControlName="description" />
    </mat-form-field>
  </form>

</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">Cancel</button>
  <button mat-flat-button (click)="save()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
